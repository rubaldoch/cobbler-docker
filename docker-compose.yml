services:
  cobbler:
    image: cobbler:3.3.7
    container_name: cobbler-3.7
    build:
      context: .
    env_file:
      - .env
    secrets:
      - cobbler_root_password
    volumes:
      - cobbler_data:/var/lib/cobbler
      - cobbler_www:/var/www/cobbler
      - ./isos:/isos
      - /mnt:/mnt:rshared
    networks:
      macvlan_net:
        ipv4_address: ${COBBLER_SERVER_HOST}

networks:
  macvlan_net:
    driver: macvlan
    driver_opts:
      parent: enp4s0
    ipam:
      config:
        - subnet: ${COBBLER_SUBNET}/${COBBLER_NETMASK_CDIR}
          gateway: ${COBBLER_ROUTERS}

secrets:
  cobbler_root_password:
    file: ./secrets/cobbler_root_password.txt

volumes:
  cobbler_data:
  cobbler_www: